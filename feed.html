<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4ECDC4">
    <title>Vizu - Feed</title>
    <link rel="stylesheet" href="css/feed.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <i class="fas fa-camera-retro" id="openCamera"></i>
        </div>
        <div class="header-center">
            <img src="assets/images/logo.svg" alt="Vizu" class="header-logo">
            <h1>VIZU</h1>
        </div>
        <div class="header-right">
            <i class="fas fa-paper-plane" id="openMessages"></i>
            <i class="fas fa-bell" id="openNotifications"></i>
        </div>
    </header>

    <div class="stories-container">
        <div class="stories-wrapper">
            <div class="story-item" id="addStory">
                <div class="story-ring add-story">
                    <div class="story-avatar">
                        <i class="fas fa-plus"></i>
                    </div>
                </div>
                <span>Seu story</span>
            </div>
            <div id="storiesList"></div>
        </div>
    </div>

    <div class="feed-container" id="feedContainer">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-pulse"></i>
            Carregando...
        </div>
    </div>

    <!-- Modal de Criar Post -->
    <div id="postModal" class="modal">
        <div class="modal-content post-modal">
            <div class="modal-header">
                <h3>Criar nova publicação</h3>
                <span class="close-post">&times;</span>
            </div>
            <div class="post-options">
                <button id="uploadPhoto" class="post-option-btn">
                    <i class="fas fa-image"></i> Foto/Vídeo
                </button>
                <button id="takePhoto" class="post-option-btn">
                    <i class="fas fa-camera"></i> Tirar foto
                </button>
            </div>
            <input type="file" id="imageUpload" accept="image/*" style="display:none">
            <textarea id="postCaption" placeholder="Escreva uma legenda..." rows="3"></textarea>
            <button id="submitPost" class="btn-submit-post">Compartilhar</button>
        </div>
    </div>

    <!-- Modal de Comentários -->
    <div id="commentsModal" class="modal">
        <div class="modal-content comments-modal">
            <div class="modal-header">
                <h3>Comentários</h3>
                <span class="close-comments">&times;</span>
            </div>
            <div id="commentsList" class="comments-list"></div>
            <div class="add-comment">
                <input type="text" id="newComment" placeholder="Adicione um comentário...">
                <button id="submitComment">Publicar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Curtidas -->
    <div id="likesModal" class="modal">
        <div class="modal-content likes-modal">
            <div class="modal-header">
                <h3>Curtidas</h3>
                <span class="close-likes">&times;</span>
            </div>
            <div id="likesList" class="likes-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" data-page="feed">
            <i class="fas fa-home"></i>
            <span>Início</span>
        </div>
        <div class="nav-item" data-page="search">
            <i class="fas fa-search"></i>
            <span>Pesquisar</span>
        </div>
        <div class="nav-item" data-page="reels">
            <i class="fas fa-play-circle"></i>
            <span>Reels</span>
        </div>
        <div class="nav-item" data-page="profile">
            <i class="fas fa-user"></i>
            <span>Perfil</span>
        </div>
    </nav>

    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/cloudinary-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
