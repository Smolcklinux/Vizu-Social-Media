<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizu - Rede Social</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #9B59B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .slogan { color: #666; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4ECDC4, #9B59B6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        .divider {
            margin: 20px 0;
            position: relative;
            text-align: center;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #ddd;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span { background: white; padding: 0 10px; color: #666; }
        a { color: #4ECDC4; text-decoration: none; cursor: pointer; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 350px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 20px;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status-online { background: #d4edda; color: #155724; }
        .status-offline { background: #f8d7da; color: #721c24; }
        .status-warning { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VIZU</h1>
        <p class="slogan">Mostre seu visual ao mundo</p>
        
        <div id="status" class="status status-warning">🔄 Pronto para usar!</div>
        
        <input type="text" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
        
        <div class="divider"><span>ou</span></div>
        
        <p>Não tem conta? <a onclick="abrirModal()">Cadastre-se</a></p>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h2>Cadastre-se</h2>
            <input type="text" id="nome" placeholder="Nome completo">
            <input type="text" id="username" placeholder="Usuário">
            <input type="email" id="emailCadastro" placeholder="Email">
            <input type="password" id="senhaCadastro" placeholder="Senha (6+ caracteres)">
            <button onclick="fazerCadastro()">Cadastrar</button>
            <div id="resultado"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIGURAÇÃO
        const SUPABASE_URL = 'https://roxxzvsqdigilfjygved.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_2_H0O56soizYrDydzKMMJQ_qg0obm8i';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Login
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            
            if (!email || !password) {
                alert('Preencha email e senha');
                return;
            }
            
            statusDiv.innerHTML = '🔄 Entrando...';
            statusDiv.className = 'status status-warning';
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                statusDiv.innerHTML = '❌ ' + error.message;
                statusDiv.className = 'status status-offline';
                alert('Erro: ' + error.message);
            } else {
                statusDiv.innerHTML = '✅ Login realizado!';
                statusDiv.className = 'status status-online';
                alert('Bem-vindo ao Vizu!');
            }
        }
        
        // Cadastro
        async function fazerCadastro() {
            const nome = document.getElementById('nome').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('emailCadastro').value;
            const password = document.getElementById('senhaCadastro').value;
            const resultadoDiv = document.getElementById('resultado');
            
            if (!nome || !username || !email || !password) {
                resultadoDiv.innerHTML = '<span style="color:#ED4956">❌ Preencha todos</span>';
                return;
            }
            
            if (password.length < 6) {
                resultadoDiv.innerHTML = '<span style="color:#ED4956">❌ Senha: mínimo 6 caracteres</span>';
                return;
            }
            
            resultadoDiv.innerHTML = '<span style="color:#856404">🔄 Cadastrando...</span>';
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { full_name: nome, username: username }
                }
            });
            
            if (error) {
                resultadoDiv.innerHTML = '<span style="color:#ED4956">❌ ' + error.message + '</span>';
            } else {
                resultadoDiv.innerHTML = '<span style="color:#155724">✅ Cadastrado! Faça login.</span>';
                setTimeout(() => {
                    fecharModal();
                    document.getElementById('email').value = email;
                }, 2000);
            }
        }
        
        function abrirModal() {
            document.getElementById('modal').style.display = 'block';
        }
        
        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        window.onclick = function(e) {
            const modal = document.getElementById('modal');
            if (e.target === modal) fecharModal();
        }
    </script>
</body>
</html>
