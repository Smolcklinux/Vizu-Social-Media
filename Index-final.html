<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizu - Rede Social</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            max-width: 400px;
            margin: 20px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .logo-text {
            font-size: 48px;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #9B59B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .slogan { color: #666; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4ECDC4, #9B59B6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn-facebook { background: #1877f2; }
        .divider {
            margin: 20px 0;
            position: relative;
            text-align: center;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #ddd;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span { background: white; padding: 0 10px; color: #666; }
        a { color: #4ECDC4; text-decoration: none; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 20px;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .error { color: #ED4956; font-size: 14px; margin-top: 10px; }
        .success { color: #4ECDC4; }
    </style>
</head>
<body>
    <div>
        <div class="login-card">
            <h1 class="logo-text">VIZU</h1>
            <p class="slogan">Mostre seu visual ao mundo</p>
            
            <div id="status" style="margin-bottom: 15px; font-size: 12px;"></div>
            
            <input type="text" id="email" placeholder="Email ou usuário">
            <input type="password" id="password" placeholder="Senha">
            <button onclick="fazerLogin()">Entrar</button>
            
            <div class="divider"><span>ou</span></div>
            <button class="btn-facebook" onclick="alert('Facebook em breve')">Continuar com Facebook</button>
            
            <p>Não tem conta? <a href="#" onclick="abrirModal()">Cadastre-se</a></p>
            <p><a href="#" onclick="alert('Recuperação de senha em breve')">Esqueceu a senha?</a></p>
        </div>
    </div>

    <!-- Modal Cadastro -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h2>Cadastre-se</h2>
            <input type="text" id="nome" placeholder="Nome completo">
            <input type="text" id="username" placeholder="Usuário">
            <input type="email" id="emailCadastro" placeholder="Email">
            <input type="password" id="senhaCadastro" placeholder="Senha">
            <button onclick="fazerCadastro()">Cadastrar</button>
            <div id="cadastroResult"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIGURAÇÃO DIRETA NO HTML
        const SUPABASE_URL = 'https://roxxzvsqdigilfjygved.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vHOFMn7VUPl37vNFDIRxnw_G4p2Z8SW';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Mostrar status
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '🟢 Conectando ao Supabase...';
        
        // Testar conexão
        async function testarConexao() {
            try {
                const { data, error } = await supabase.from('perfis').select('count', { count: 'exact', head: true });
                if (error) {
                    statusDiv.innerHTML = '🔴 Erro: ' + error.message;
                } else {
                    statusDiv.innerHTML = '🟢 Conectado! Pronto para usar';
                }
            } catch(e) {
                statusDiv.innerHTML = '🔴 Erro de conexão';
            }
        }
        
        testarConexao();
        
        // Função de Login
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Preencha todos os campos');
                return;
            }
            
            statusDiv.innerHTML = '⏳ Entrando...';
            
            let loginEmail = email;
            if (!email.includes('@')) {
                loginEmail = email + '@vizu.com';
            }
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: loginEmail,
                password: password
            });
            
            if (error) {
                statusDiv.innerHTML = '🔴 Erro: ' + error.message;
                alert('Erro: ' + error.message);
            } else {
                statusDiv.innerHTML = '🟢 Login realizado! Redirecionando...';
                alert('Login realizado com sucesso!');
                // window.location.href = 'feed.html';
            }
        }
        
        // Função de Cadastro
        async function fazerCadastro() {
            const nome = document.getElementById('nome').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('emailCadastro').value;
            const password = document.getElementById('senhaCadastro').value;
            const resultDiv = document.getElementById('cadastroResult');
            
            if (!nome || !username || !email || !password) {
                resultDiv.innerHTML = '<span class="error">Preencha todos os campos</span>';
                return;
            }
            
            if (password.length < 6) {
                resultDiv.innerHTML = '<span class="error">Senha deve ter pelo menos 6 caracteres</span>';
                return;
            }
            
            resultDiv.innerHTML = '⏳ Cadastrando...';
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: nome,
                        username: username
                    }
                }
            });
            
            if (error) {
                resultDiv.innerHTML = '<span class="error">❌ ' + error.message + '</span>';
            } else {
                resultDiv.innerHTML = '<span class="success">✅ Cadastro realizado! Faça login.</span>';
                setTimeout(() => {
                    fecharModal();
                    document.getElementById('email').value = email;
                }, 2000);
            }
        }
        
        function abrirModal() {
            document.getElementById('modal').style.display = 'block';
        }
        
        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('cadastroResult').innerHTML = '';
        }
        
        window.onclick = function(e) {
            const modal = document.getElementById('modal');
            if (e.target === modal) fecharModal();
        }
    </script>
</body>
</html>
